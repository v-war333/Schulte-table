<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schulte</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="firstPage">
        <div id="fp-btn">
            <div id="title"><h2>Schulte Table</h2></div>
        <button class="btn1" id="newGame">New Game</button>
        <br>
        <button class="btn1">Load Game</button>
        </div>
        <div id="fp-me">
            <a id="link-me" class="link-me" href="contact.html">Contact Me</a>
        </div>
    </div>

    <div id="secondPage">
        <div id="sp-btn">
            <button class="btn1" id="timeBtn">Timer</button>
            <br>
            <button class="btn1" id="numberBtn">Number</button>
        </div>
        <div id="sback">
            <button class="back-btn" id="second-back">Back</button>
        </div>
        <div id="fp-me">
            <a id="link-me" class="link-me" href="contact.html">Contact Me</a>
        </div>
    </div>
    <div id="timePage">
        <div id="times">
            <div class="time-btn">
                <button class="btns" id="btn-15s">15s</button>
            </div>
            <div class="time-btn">
                <button class="btns" id="btn-30s">30s</button>
            </div>
            <div class="time-btn">
                <button class="btns" id="btn-60s">60s</button>
            </div>
            <div class="time-btn">
                <button class="btns" id="btn-120s">120s</button>
            </div>
        </div>
        <div id="tback">
            <button class="back-btn" id="timeBack">Back</button>
        </div>
        <div class="fp-me">
            <a href="contact.html" class="link-me" id="link-me">Contact Me</a>
        </div>
    </div>
    <div id="tablePage">
        <div id="times">
            <div class="time-btn">
                <button class="btns" id="btn-2">2x2</button>
            </div>
            <div class="time-btn">
                <button class="btns" id="btn-3">3x3</button>
            </div>
            <div class="time-btn">
                <button class="btns" id="btn-4">4x4</button>
            </div>
            <div class="time-btn">
                <button class="btns" id="btn-5">5x5</button>
            </div>
        </div>
        <div id="tback">
            <button class="back-btn" id="numberBack">Back</button>
        </div>
        <div class="fp-me">
            <a href="contact.html" class="link-me" id="link-me">Contact Me</a>
        </div>
    </div>
    <div id="mainPage">
        <div id="heading">
        

        
            <div id="time" class="info">
                        <h2>Time:</h2>
                    <div id="fortime"></div>
            </div>

            <div id="turn" class="info">
                <h1>TURN: <div id="forturn"></div>
                </h1>
            </div>


            <div id="score" class="info">
                    <h2 >Score:</h2>
                    <div id="forscore">00</div>
            </div>
        
        </div>
    
            <div  id="mainpart">
            </div>
                <button  id="restart" class="restart5">Restart</button>
    </div>
    <div id="result-page">
        <h1>Score: </h1>
        <h1 id="result">00</h1>
        <button id="start-again">Start Again</button>
    </div>
    
    <script src="script.js"></script>
    <script src="times.js"></script>
    <script src="numbers.js"></script>
</body>
</html>
